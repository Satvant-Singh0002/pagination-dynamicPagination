<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="report.css">
     <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

</head>
<body>
    <div class="main-container">
     <form id="ExpenseForm">
        <label for="expense">Choose Expenseamount :</label>
        <input type="text"id="expense">
        <label for="description">Choose Description :</label>
        <input type="text"id="description">
        <label for="Category">Choose a Category</label>
        <input type="text" id="category"name="category"placeholder="Enter category" required>
         <button type="submit">Add Expense</button>
        

     </form>
  

  <div class="expense-dashboard">
    <h2>Expense Dashboard</h2>

    <div id="expenseList" class="expense-list">
    </div>
</div>
</div>
<div id="premiumSection" style="display:none;" class="premium-section">
    <h2>⭐ You are a Premium User</h2>

    <button id="leaderboardBtn" class="leaderboard-btn">
        🏆 Leaderboard
    </button>
</div>

<button id="premiumBtn" class="premium-btn" onclick="buyPremium()">
    👑 Buy Premium
</button>
<!-- for ai report -->
  <button id="reportBtn">🤖 Generate AI Report</button>
    <div id="aiPopup" class="ai-popup">
    <div class="popup-header">
        <span>🤖 AI Expense Assistant</span>
        <button id="closePopup">✖</button>
    </div>

    <div id="popupBody">
    
    </div>
</div>

<script src="
https://cdn.jsdelivr.net/npm/axios@1.18.0/dist/axios.min.js
"></script>

    <script src="expense.js"></script>
    <script src="report.js"></script>
</body>
</html>
